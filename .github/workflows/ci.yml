name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The pure-module tests need no install; the index.test.ts dispatcher
      # harness needs the pi SDK (a registry-resolvable peer dep) and skips
      # itself when the SDK is absent. Install so the full suite runs, but a
      # registry hiccup must not mask the SDK-free tests: on install failure
      # the suite still runs (the harness skips).
      - name: Install
        run: npm install || echo "install failed - SDK-dependent tests will skip"
      - name: Test
        run: node --test ./src/*.test.ts

  typecheck:
    runs-on: ubuntu-latest
    # Best-effort: the pi SDK packages are host-bundled (peerDependencies), so a
    # bare `npm install` may not resolve their types in CI. Don't fail the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck
