name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The unit suite is SDK-free (pure modules + node:test), so it needs no
      # install — it runs against Node's built-in TypeScript stripping.
      - name: Test
        run: node --test ./src/*.test.ts

  typecheck:
    runs-on: ubuntu-latest
    # Best-effort: the pi SDK packages are host-bundled (peerDependencies), so a
    # bare `npm install` may not resolve their types in CI. Don't fail the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck
